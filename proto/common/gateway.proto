syntax = "proto3";

package gateway.v1;

import "google/protobuf/timestamp.proto";

option go_package = "./pb;pb";


// ConnectedMessage 连接成功消息
// MessageType: GATEWAY_CONNECTED (1)
message ConnectedMessage {
  string connection_id = 1;
  int64 user_id = 2;
  google.protobuf.Timestamp server_time = 3;
}

// PingMessage Ping消息（心跳+延迟测量）
// MessageType: GATEWAY_PING_REQ (2)
message PingMessage {
  google.protobuf.Timestamp timestamp = 1;   // 发送时间戳
  string client_id = 2;                      // 客户端标识（可选）
}

// PongMessage Pong响应消息（心跳确认+延迟信息）
// MessageType: GATEWAY_PONG_RES (3)
message PongMessage {
  google.protobuf.Timestamp timestamp = 1;         // 响应时间戳
  google.protobuf.Timestamp ping_timestamp = 2;   // 对应的ping时间戳
  int64 round_trip_time_ms = 3;                   // 往返时间（毫秒）
}

// TestMessage 测试消息
// MessageType: GATEWAY_TEST (4)
message TestMessage {
  string message = 1;                         // 测试文本内容
  int32 number = 2;                          // 测试数字
  google.protobuf.Timestamp timestamp = 3;   // 时间戳
  bool echo_back = 4;                        // 是否需要回显
}




